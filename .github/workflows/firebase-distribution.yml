name: Firebase App Distribution

on:
  push:
    tags:
      - 'v*-dev-*'
      - 'v*.*.*-*'

permissions:
  contents: read

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  distribute-dev:
    name: Distribute Dev/Staging Release
    if: contains(github.ref_name, '-dev-')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate local.properties for CI
        run: |
          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          TMDB_API_KEY=${TMDB_API_KEY}
          EOF
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Build staging release artifact
        run: ./gradlew assembleStagingRelease --stacktrace

      - name: Build release notes from tag commits
        id: release_notes
        run: |
          NOTES=$(git log -n 20 --pretty=format:'- %h %s (%an)')
          {
            echo 'notes<<EOF'
            echo "Release: ${{ github.ref_name }}"
            echo
            echo "${NOTES}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload staging release to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_STAGING }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internal-testers,qa
          file: app/build/outputs/apk/staging/release/app-staging-release.apk
          releaseNotes: ${{ steps.release_notes.outputs.notes }}

  distribute-prod:
    name: Distribute Production Release
    if: startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-dev-')
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate local.properties for CI
        run: |
          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          TMDB_API_KEY=${TMDB_API_KEY}
          EOF
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Build prod release artifact
        run: ./gradlew assembleProdRelease --stacktrace

      - name: Build release notes from tag commits
        id: release_notes
        run: |
          NOTES=$(git log -n 20 --pretty=format:'- %h %s (%an)')
          {
            echo 'notes<<EOF'
            echo "Release: ${{ github.ref_name }}"
            echo
            echo "${NOTES}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload prod release to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_PROD }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internal-testers,prod-beta
          file: app/build/outputs/apk/prod/release/app-prod-release.apk
          releaseNotes: ${{ steps.release_notes.outputs.notes }}
